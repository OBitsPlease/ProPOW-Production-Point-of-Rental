name: Build ProPOR+ - Production Point of Rental Plus Truck Loading

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npx vite build

      - name: Build macOS
        # --publish never: builds app + generates fresh latest-mac.yml without uploading.
        # We upload everything ourselves in the release job to avoid 422 conflicts.
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProPOR-macOS
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.blockmap
            dist-electron/latest-mac.yml
          retention-days: 3

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npx vite build

      - name: Build Windows
        # --publish never: builds app + generates fresh latest.yml without uploading.
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProPOR-Windows
          path: |
            dist-electron/*.exe
            dist-electron/latest.yml
          retention-days: 3

  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ProPOR-macOS
          path: release/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: ProPOR-Windows
          path: release/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ProPOR+ ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            release/mac/*.dmg
            release/mac/*.zip
            release/mac/*.blockmap
            release/mac/latest-mac.yml
            release/win/*.exe
            release/win/latest.yml
          body: |
            ## ProPOR+ ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | macOS | `.dmg` — drag to Applications |
            | Windows | `.exe` — run installer |

            ### First Launch Note (macOS)
            Right-click the app → Open, then click Open to bypass Gatekeeper the first time.
