name: Build ProPOR+ - Production Point of Rental Plus Truck Loading

on:
  push:
    tags:
      - 'v*'           # Runs when you push a tag like v1.0.0
  workflow_dispatch:   # Also lets you trigger it manually from GitHub UI

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (macOS)
        # dist/ is pre-built and committed — skip Vite build
        run: npx electron-builder --mac --publish never
        env:
          # Skip code signing — app will work but macOS will warn first launch
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProPOR-macOS
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/latest-mac.yml
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (Windows)
        # dist/ is pre-built and committed — skip Vite build
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProPOR-Windows
          path: |
            dist-electron/*.exe
            dist-electron/latest.yml
          retention-days: 30

  # Optional: auto-create a GitHub Release when you push a v* tag
  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: ProPOR-macOS
          path: release/mac

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: ProPOR-Windows
          path: release/win

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ProPOR+ ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release/mac/*.dmg
            release/mac/*.zip
            release/mac/latest-mac.yml
            release/win/*.exe
            release/win/latest.yml
          body: |
            ## ProPOR+ ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | macOS | `.dmg` — drag to Applications |
            | Windows | `.exe` — run installer |

            ### First Launch Note (macOS)
            Right-click the app → Open, then click Open to bypass Gatekeeper the first time.

            This release includes:
            - Production Point of Rental Plus Truck Loading
            - Full installer packages for both macOS and Windows
            - 3D truck load visualization and optimization
            - Inventory and case management
            - Event and crew planning
